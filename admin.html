<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Nexus Tech</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0A0A0A;color:#fff;min-height:100vh}
a{color:#0066FF;text-decoration:none}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:#0B1F3B;border:1px solid rgba(0,102,255,.2);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;text-align:center}
.login-box h1{font-size:1.6rem;margin-bottom:8px}
.login-box p{color:#8899AA;margin-bottom:36px;font-size:.9rem}
.fg{margin-bottom:18px;text-align:left}
.fg label{display:block;font-size:.8rem;font-weight:600;color:#8899AA;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.fg input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:13px 16px;color:#fff;font-size:.95rem;outline:none;transition:border-color .25s}
.fg input:focus{border-color:#0066FF}
.login-btn{width:100%;padding:14px;background:#CC5500;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .25s;margin-top:8px;font-family:inherit}
.login-btn:hover{background:#e06000}
.err{color:#FF7A90;font-size:.85rem;margin-top:12px;display:none}
/* Admin */
.admin-bar{background:#050B14;border-bottom:1px solid rgba(0,102,255,.15);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.2rem;font-weight:800}
.logo span{color:#CC5500}.logo em{color:#0066FF;font-style:normal}
.logout-btn{padding:8px 20px;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#8899AA;font-size:.85rem;background:none;cursor:pointer;font-family:inherit;transition:all .25s}
.logout-btn:hover{background:#FF4A6B;border-color:#FF4A6B;color:#fff}
.main{max-width:1200px;margin:0 auto;padding:40px 24px}
.stats-row{display:flex;gap:20px;margin-bottom:36px;flex-wrap:wrap}
.stat{background:rgba(11,31,59,.6);border:1px solid rgba(0,102,255,.15);border-radius:16px;padding:24px 28px;flex:1;min-width:160px}
.stat-num{font-size:2rem;font-weight:800;color:#0066FF}
.stat-label{font-size:.85rem;color:#8899AA;margin-top:4px}
.search-row{display:flex;gap:12px;margin-bottom:28px}
.search-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 18px;color:#fff;font-size:.95rem;outline:none;transition:border-color .25s;font-family:inherit}
.search-row input:focus{border-color:#0066FF}
.search-row button{padding:12px 24px;background:#0066FF;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit}
.search-row .clear-btn{padding:12px 20px;border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#8899AA;background:none;cursor:pointer;font-family:inherit;display:none}
.table-wrap{overflow-x:auto;border-radius:16px;border:1px solid rgba(0,102,255,.12)}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{background:rgba(0,102,255,.1);padding:14px 18px;text-align:left;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8899AA;border-bottom:1px solid rgba(0,102,255,.12)}
tbody tr{border-bottom:1px solid rgba(255,255,255,.05);transition:background .2s}
tbody tr:hover{background:rgba(0,102,255,.06)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:14px 18px;font-size:.88rem;color:rgba(255,255,255,.8)}
.badge-id{background:rgba(0,102,255,.15);color:#69AAFF;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:700}
.no-data{text-align:center;padding:60px;color:#8899AA}
.loading{text-align:center;padding:60px;color:#8899AA}
#loginSection{display:block}
#adminSection{display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginSection">
  <div class="login-wrap">
    <div class="login-box">
      <h1>🔐 Admin Panel</h1>
      <p>Acceso restringido — Nexus Tech</p>
      <div class="fg">
        <label>Usuario</label>
        <input type="text" id="loginUser" autocomplete="username">
      </div>
      <div class="fg">
        <label>Contraseña</label>
        <input type="password" id="loginPass" autocomplete="current-password">
      </div>
      <p class="err" id="loginErr">Credenciales incorrectas.</p>
      <button class="login-btn" id="loginBtn">Ingresar</button>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminSection">
  <div class="admin-bar">
    <div class="logo"><span>Nexus</span><em>Tech</em> · Admin</div>
    <button class="logout-btn" id="logoutBtn">Cerrar sesión</button>
  </div>
  <div class="main">
    <div class="stats-row">
      <div class="stat">
        <div class="stat-num" id="statTotal">—</div>
        <div class="stat-label">Clientes registrados</div>
      </div>
      <div class="stat">
        <div class="stat-num" style="color:#CC5500" id="statDate">—</div>
        <div class="stat-label">Fecha actual</div>
      </div>
    </div>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Buscar por nombre, correo o teléfono…">
      <button id="searchBtn">Buscar</button>
      <button class="clear-btn" id="clearBtn">✕ Limpiar</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Nombres</th><th>Apellidos</th>
            <th>Correo</th><th>Teléfono</th><th>Mensaje</th><th>Fecha</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7" class="loading">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ── Credenciales frontend (solo para UI — la API valida con ADMIN_TOKEN) ──
const UI_USER = 'nexusadmin';
const UI_PASS = 'Nexus@2024!';   // Cambia esto

let adminToken = sessionStorage.getItem('adminToken') || '';

function showAdmin() {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('adminSection').style.display = 'block';
  document.getElementById('statDate').textContent = new Date().toLocaleDateString('es-CO');
  loadClients();
}

// Auto-login si ya hay token
if (adminToken) showAdmin();

// ── Login ──────────────────────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', async () => {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';

  if (u === UI_USER && p === UI_PASS) {
    adminToken = p; // token simple
    sessionStorage.setItem('adminToken', adminToken);
    showAdmin();
  } else {
    errEl.style.display = 'block';
  }
});
document.getElementById('loginUser').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginBtn').click(); });
document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginBtn').click(); });

// ── Logout ─────────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('adminToken');
  location.reload();
});

// ── Load clients ────────────────────────────────────────────
async function loadClients(search = '') {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '<tr><td colspan="7" class="loading">Cargando…</td></tr>';
  document.getElementById('statTotal').textContent = '—';

  const url = search ? `/api/admin?s=${encodeURIComponent(search)}&token=${encodeURIComponent(adminToken)}`
                     : `/api/admin?token=${encodeURIComponent(adminToken)}`;
  try {
    const res  = await fetch(url);
    const data = await res.json();

    if (!data.success) {
      tbody.innerHTML = `<tr><td colspan="7" class="no-data">Error: ${data.message}</td></tr>`;
      return;
    }

    document.getElementById('statTotal').textContent = data.total;

    if (data.total === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="no-data">No hay registros${search ? ' para "'+search+'"' : ''}.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.data.map(c => `
      <tr>
        <td><span class="badge-id">#${c.id}</span></td>
        <td>${esc(c.nombres)}</td>
        <td>${esc(c.apellidos)}</td>
        <td>${esc(c.correo)}</td>
        <td>${esc(c.telefono)}</td>
        <td style="max-width:220px">${esc((c.mensaje||'').substring(0,80))}…</td>
        <td style="color:#8899AA;font-size:.8rem">${c.fecha ? new Date(c.fecha).toLocaleString('es-CO') : '—'}</td>
      </tr>
    `).join('');

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="7" class="no-data">Error de conexión con la API.</td></tr>`;
  }
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Search ──────────────────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click', () => {
  const s = document.getElementById('searchInput').value.trim();
  document.getElementById('clearBtn').style.display = s ? 'block' : 'none';
  loadClients(s);
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('searchBtn').click();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  loadClients();
});
</script>
</body>
</html>
